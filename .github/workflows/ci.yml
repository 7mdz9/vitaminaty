name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      # Placeholder values satisfy shape-only env validation in CI.
      # Real deployment secrets belong in GitHub/Vercel secrets, not this file.
      VITAMINATY_APP_URL: http://localhost:3000
      VITAMINATY_APP_ENV: development
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_SITE_NAME: Vitaminaty
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      SUPABASE_PROJECT_REF: placeholder
      SUPABASE_JWT_SECRET: placeholder-jwt-secret
      PAYMOB_MODE: stub
      ICARRY_MODE: stub
      EMAIL_PROVIDER: stub
      EMAIL_FROM_ADDRESS: orders@vitaminaty.ae
      EMAIL_FROM_NAME: Vitaminaty
      EMAIL_REPLY_TO: support@vitaminaty.ae
      ADMIN_SESSION_SECRET: 00000000000000000000000000000000
      INITIAL_ADMIN_EMAIL: admin@vitaminaty.ae
      MFA_ISSUER_NAME: Vitaminaty Admin
      FEATURE_FLAGS_PROVIDER: database
      RATE_LIMIT_BACKEND: memory
      IDEMPOTENCY_HMAC_SECRET: 11111111111111111111111111111111
      SUPPORT_CHAT_PROVIDER: "null"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
